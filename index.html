<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocoon Timetable Maker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="form-container">
        <header>
            <img src="./cocoon logo.webp" alt="Cocoon Logo" class="logo">
            <h1 class="brand-name">COCOON GROUP TUITION</h1>
            <h2 class="form-title">TIMETABLE MAKER</h2>
            <p class="form-subtitle">Create and manage daily class schedules.</p>
        </header>

        <form id="timetableForm">
            <!-- Section 1: General Information -->
            <section>
                <h3 class="section-title">General Information</h3>
                <div class="grid-row">
                    <div class="input-group">
                        <label for="made_by">Made By <span class="required">*</span></label>
                        <input type="text" id="made_by" name="made_by" placeholder="Enter your name" required>
                    </div>
                    <div class="input-group">
                        <label>Grade <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="grade" value="9" required> Grade 9</label>
                            <label class="radio-label"><input type="radio" name="grade" value="10"> Grade 10</label>
                        </div>
                    </div>
                </div>
                <div class="grid-row">
                    <div class="input-group">
                        <label>Batch <span class="required">*</span></label>
                        <div class="checkbox-group">
                            <label class="check-label"><input type="checkbox" name="batch" value="A"> A</label>
                            <label class="check-label"><input type="checkbox" name="batch" value="B"> B</label>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Branch <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="branch" value="A" checked> A</label>
                            <label class="radio-label"><input type="radio" name="branch" value="N"> N</label>
                            <label class="radio-label"><input type="radio" name="branch" value="T"> T</label>
                        </div>
                    </div>
                </div>
                <div class="grid-row">
                    <div class="input-group" style="grid-column: span 2;">
                        <label>Schedule Type <span class="required">*</span></label>
                        <div class="radio-group">
                            <label class="radio-label"><input type="radio" name="schedule_type" value="Weekly" checked> Weekly Schedule</label>
                            <label class="radio-label"><input type="radio" name="schedule_type" value="Exam"> Exam Notice</label>
                        </div>
                    </div>
                </div>

                <div class="grid-row exam-notice-fields" id="examNoticeFields" style="display: none;">
                    <div class="input-group">
                        <label>Target School <span class="required">*</span></label>
                        <select name="exam_school">
                            <option value="" disabled selected>Select School</option>
                            <option value="NHPS">NHPS</option>
                            <option value="NHSS">NHSS</option>
                            <option value="DAV">DAV</option>
                            <option value="DMWA">DMWA</option>
                            <option value="Coral Bells">Coral Bells</option>
                            <option value="New Bombay">New Bombay</option>
                            <option value="Phoenix">Phoenix</option>
                            <option value="Zenith">Zenith</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Exam Date Range <span class="required">*</span></label>
                        <input type="text" name="exam_dates" placeholder="e.g. 15th-20th May">
                    </div>
                </div>
            </section>

            <!-- Dynamic Days Container -->
            <div id="daysContainer">
                <!-- Days will be generated by JS to keep HTML clean -->
            </div>

            <!-- Notes Section -->
            <section id="notesSection">
                <h3 class="section-title">Parent Notes (Optional)</h3>
                <div id="notesContainer">
                    <!-- Notes will be added here -->
                </div>
                <button type="button" class="add-note-btn" id="addNoteBtn" style="margin-top: 10px;">+ Add Note</button>
            </section>

            <!-- Success Modal -->
            <div class="success-overlay" id="successOverlay">
                <div class="success-card">
                    <div class="success-icon">✓</div>
                    <h2>Schedule Created!</h2>
                    <p>The timetable data has been sent securely.</p>
                </div>
            </div>

            <!-- Error Modal -->
            <div class="error-overlay" id="errorOverlay">
                <div class="success-card">
                    <div class="error-icon">✕</div>
                    <h2 style="color: var(--error-color);">Webhook Not Responding!</h2>
                    <p>The webhook wasn't listening or returned an error.</p>
                    <button type="button" class="submit-btn" style="margin-top:20px; background:var(--error-color); padding: 10px 30px;" onclick="document.getElementById('errorOverlay').classList.remove('active'); document.getElementById('submitBtn').textContent = 'Submit Timetable'; document.getElementById('submitBtn').disabled = false;">Close & Keep Data</button>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="submit-btn" id="submitBtn">Submit Timetable</button>
            </div>
        </form>
    </div>

    <!-- Template for a single day section -->
    <template id="dayTemplate">
        <section class="day-section" id="day_section_{day}">
            <h3 class="section-title">{DayName}</h3>
            <div class="day-controls grid-row">
                <div class="input-group">
                    <label>Date <span class="required">*</span></label>
                    <input type="date" class="day-date" name="date_{day}" required>
                </div>
                <div class="input-group">
                    <label>Holiday?</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="holiday_{day}" value="Yes"> Yes</label>
                        <label class="radio-label"><input type="radio" name="holiday_{day}" value="No" checked> No</label>
                    </div>
                </div>
                <div class="input-group lecture-count-group">
                    <label>No. of Lectures</label>
                    <input type="number" class="lecture-count" name="lecture_count_{day}" min="1" max="10" placeholder="e.g. 2">
                </div>
            </div>
            
            <div class="lectures-container" id="lectures_{day}">
                <!-- Lecture forms will be injected here dynamically -->
            </div>
        </section>
    </template>

    <!-- Template for a single lecture -->
    <template id="lectureTemplate">
        <div class="lecture-block">
            <h4 class="lecture-title">Lecture {lectureNum}</h4>
            <div class="lecture-grid">
                <div class="input-group">
                    <label>Timing (From) <span class="required">*</span></label>
                    <div class="custom-time-picker">
                        <input type="number" class="t-hr" name="hr_from_{day}_{lectureNum}" min="1" max="12" placeholder="12" required>
                        <span class="colon">:</span>
                        <input type="number" class="t-min" name="min_from_{day}_{lectureNum}" min="0" max="59" placeholder="00" required>
                        <select class="t-ampm" name="ampm_from_{day}_{lectureNum}">
                            <option value="AM">AM</option>
                            <option value="PM" selected>PM</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Timing (To) <span class="required">*</span></label>
                    <div class="custom-time-picker">
                        <input type="number" class="t-hr" name="hr_to_{day}_{lectureNum}" min="1" max="12" placeholder="12" required>
                        <span class="colon">:</span>
                        <input type="number" class="t-min" name="min_to_{day}_{lectureNum}" min="0" max="59" placeholder="00" required>
                        <select class="t-ampm" name="ampm_to_{day}_{lectureNum}">
                            <option value="AM">AM</option>
                            <option value="PM" selected>PM</option>
                        </select>
                    </div>
                </div>
                <div class="input-group searchable-dropdown-container">
                    <label>Subject <span class="required">*</span></label>
                    <div class="searchable-dropdown">
                        <input type="text" class="subject-search" placeholder="Search Subject..." autocomplete="off">
                        <div class="dropdown-list subject-list"></div>
                        <input type="hidden" name="subject_{day}_{lectureNum}" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Topic Name</label>
                    <input type="text" name="topic_{day}_{lectureNum}" placeholder="e.g. Linear Equations">
                </div>
                <div class="input-group">
                    <label>Teacher <span class="required">*</span></label>
                    <select name="teacher_{day}_{lectureNum}" required>
                        <option value="" disabled selected>Select Teacher</option>
                        <!-- Teachers populated via JS -->
                    </select>
                </div>
                <div class="input-group test-group">
                    <label>Test Session?</label>
                    <label class="check-label" style="margin-top:4px;"><input type="checkbox" name="is_test_{day}_{lectureNum}" class="is-test-checkbox" value="Yes"> Is Test</label>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
